name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run lint:throws-diff
      - run: npm run test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: bash packaging/install-linux-deps.sh

      - name: Prepare bellman sidecar
        run: bash packaging/prepare-sidecar.sh

      - run: cargo test
        working-directory: src-tauri

      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

  build:
    runs-on: ubuntu-latest
    needs: [frontend, rust]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: bash packaging/install-linux-deps.sh

      - run: npm ci

      - name: Prepare bellman sidecar
        run: bash packaging/prepare-sidecar.sh

      - run: npm run tauri build -- --no-bundle
