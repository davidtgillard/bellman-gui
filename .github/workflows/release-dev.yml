name: Release dev

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build AppImage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: bash packaging/install-linux-deps.sh

      - name: Prepare cytoscape-compound-graph dependency
        run: bash packaging/prepare-compound-graph.sh

      - run: npm ci

      - name: Prepare bellman sidecar
        run: bash packaging/prepare-sidecar.sh

      - name: Stamp release version
        run: bash packaging/stamp-version.sh "0.1.${{ github.run_number }}"

      - name: Build AppImage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Stage release artifacts
        env:
          VERSION: "0.1.${{ github.run_number }}"
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          APPIMAGE_DIR="src-tauri/target/release/bundle/appimage"
          mapfile -t APPIMAGES < <(find "${APPIMAGE_DIR}" -maxdepth 1 -type f -name '*.AppImage' | sort)
          if [[ "${#APPIMAGES[@]}" -ne 1 ]]; then
            echo "Expected exactly one AppImage in ${APPIMAGE_DIR}, found ${#APPIMAGES[@]}" >&2
            ls -la "${APPIMAGE_DIR}" >&2 || true
            exit 1
          fi
          APPIMAGE="${APPIMAGES[0]}"
          SIG="${APPIMAGE}.sig"
          if [[ ! -f "${SIG}" ]]; then
            echo "Missing signature: ${SIG}" >&2
            exit 1
          fi
          cp "${APPIMAGE}" dist/release/
          cp "${SIG}" dist/release/
          bash packaging/write-latest-json.sh \
            --version "${VERSION}" \
            --appimage "${APPIMAGE}" \
            --sig "${SIG}" \
            --repo "${REPO}" \
            --out dist/release/latest.json
          ls -la dist/release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bellman-gui-appimage
          path: dist/release/*

  publish-dev-release:
    name: Publish dev release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: bellman-gui-appimage
          path: release

      - name: Ensure dev release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view dev --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
          gh release create dev \
            --repo "$GITHUB_REPOSITORY" \
            --title "Development AppImage" \
            --notes "Rolling development AppImage for bellman-gui (linux-x86_64)." \
            --prerelease

      - name: Remove existing dev assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/dev" --jq '.id')"
          gh api "repos/$GITHUB_REPOSITORY/releases/$release_id/assets" --jq '.[].id' | while read -r asset_id; do
            [ -n "$asset_id" ] || continue
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
          done

      - name: Upload fresh dev bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload dev release/* --repo "$GITHUB_REPOSITORY"
