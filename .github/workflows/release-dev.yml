name: Release dev

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build portable bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: bash packaging/install-linux-deps.sh

      - run: npm ci

      - name: Fetch bellman sidecar
        run: bash packaging/fetch-bellman-sidecar.sh

      - run: npm run tauri build -- --no-bundle

      - name: Package portable release
        run: bash packaging/bundle-portable.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bellman-gui-portable
          path: dist/release/*

  publish-dev-release:
    name: Publish dev release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: bellman-gui-portable
          path: release

      - name: Ensure dev release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view dev --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
          gh release create dev \
            --repo "$GITHUB_REPOSITORY" \
            --title "Development bundles" \
            --notes "Rolling development portable bundles for bellman-gui (linux-x86_64)." \
            --prerelease

      - name: Remove existing dev assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/dev" --jq '.id')"
          gh api "repos/$GITHUB_REPOSITORY/releases/$release_id/assets" --jq '.[].id' | while read -r asset_id; do
            [ -n "$asset_id" ] || continue
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
          done

      - name: Upload fresh dev bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload dev release/* --repo "$GITHUB_REPOSITORY"
